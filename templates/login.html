{% extends "base.html" %}
{% block title %}Log in · Comic Scanner{% endblock %}

{% block content %}
<div class="auth">
    <div class="card">
        <h1>Log in</h1>
        <form method="POST" class="auth-form">
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Log in</button>
        </form>
        <p class="muted switch">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
    </div>
</div>

<style>
    .auth { max-width: 400px; margin: 20px auto; }
    .auth h1 { margin: 0 0 18px; font-size: 24px; text-align: center; }
    .auth-form { display: flex; flex-direction: column; gap: 12px; }
    .switch { text-align: center; margin: 16px 0 0; }
</style>
{% endblock %}
