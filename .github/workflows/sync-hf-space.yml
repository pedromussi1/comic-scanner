name: Sync to Hugging Face Space

# Auto-deploys to https://huggingface.co/spaces/Zao0531/comic-scanner on every push to main
# that touches app code. Uploads only the app files (leaving the Space's own README, which
# holds the HF config). Requires an HF write token in the repo secret HF_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "database.py"
      - "extensions.py"
      - "comicid/**"
      - "templates/**"
      - "static/**"
      - "data/index/**"
      - "Dockerfile"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face CLI
        run: pip install --upgrade "huggingface_hub[cli]"

      - name: Stage app files
        run: |
          mkdir -p _hf/comicid _hf/templates _hf/static _hf/data
          cp app.py database.py extensions.py requirements.txt Dockerfile _hf/
          cp -r comicid _hf/
          cp -r templates _hf/
          cp -r static _hf/
          cp -r data/index _hf/data/index

      - name: Upload to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: >
          hf upload Zao0531/comic-scanner _hf . --repo-type space
          --token "$HF_TOKEN"
          --commit-message "Sync from GitHub @ ${{ github.sha }}"
